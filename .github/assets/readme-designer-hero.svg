<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="640" viewBox="0 0 1280 640" role="img" aria-labelledby="title desc">
  <title id="title">GitHub README Designer visual workflow</title>
  <desc id="desc">A stylized GitHub README canvas showing identity, proof, and pathway arranged into a strong opening viewport.</desc>
  <defs>
    <linearGradient id="bg" x1="80" y1="32" x2="1200" y2="608" gradientUnits="userSpaceOnUse">
      <stop stop-color="#15112A"/>
      <stop offset="0.52" stop-color="#172B3B"/>
      <stop offset="1" stop-color="#102D29"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#A78BFA"/>
      <stop offset="0.5" stop-color="#60A5FA"/>
      <stop offset="1" stop-color="#34D399"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="22" stdDeviation="24" flood-color="#020617" flood-opacity="0.42"/>
    </filter>
  </defs>

  <rect width="1280" height="640" rx="32" fill="url(#bg)"/>
  <circle cx="1120" cy="72" r="260" fill="#6D5BD0" opacity="0.10"/>
  <circle cx="116" cy="620" r="260" fill="#2DD4BF" opacity="0.08"/>

  <g transform="translate(74 70)">
    <rect x="0" y="0" width="354" height="500" rx="24" fill="#0D1117" stroke="#30363D" filter="url(#shadow)"/>
    <rect x="0" y="0" width="354" height="48" rx="24" fill="#161B22"/>
    <rect x="0" y="28" width="354" height="20" fill="#161B22"/>
    <circle cx="28" cy="24" r="6" fill="#FF7B72"/>
    <circle cx="50" cy="24" r="6" fill="#D29922"/>
    <circle cx="72" cy="24" r="6" fill="#3FB950"/>

    <rect x="88" y="82" width="178" height="18" rx="9" fill="url(#accent)"/>
    <rect x="62" y="116" width="230" height="8" rx="4" fill="#8B949E" opacity="0.8"/>
    <rect x="112" y="142" width="130" height="7" rx="3.5" fill="#484F58"/>

    <g transform="translate(64 174)">
      <rect width="226" height="146" rx="14" fill="#161B22" stroke="#30363D"/>
      <rect x="18" y="20" width="190" height="16" rx="8" fill="#21262D"/>
      <rect x="18" y="54" width="152" height="10" rx="5" fill="#6E56CF"/>
      <rect x="42" y="78" width="166" height="10" rx="5" fill="#2F81F7"/>
      <rect x="66" y="102" width="112" height="10" rx="5" fill="#2EA043"/>
    </g>

    <rect x="66" y="350" width="92" height="22" rx="11" fill="#6E56CF"/>
    <rect x="166" y="350" width="60" height="22" rx="11" fill="#21262D" stroke="#484F58"/>
    <rect x="234" y="350" width="54" height="22" rx="11" fill="#21262D" stroke="#484F58"/>
    <rect x="44" y="408" width="266" height="8" rx="4" fill="#30363D"/>
    <rect x="44" y="432" width="230" height="8" rx="4" fill="#30363D"/>
    <rect x="44" y="456" width="250" height="8" rx="4" fill="#30363D"/>
  </g>

  <g transform="translate(500 102)">
    <text x="0" y="24" fill="#A5B4FC" font-family="ui-monospace, SFMono-Regular, Consolas, monospace" font-size="15" font-weight="700" letter-spacing="2">DESIGN THE FIRST THIRD</text>
    <text x="0" y="91" fill="#F8FAFC" font-family="ui-sans-serif, system-ui, sans-serif" font-size="48" font-weight="750">Identity.</text>
    <text x="0" y="147" fill="#F8FAFC" font-family="ui-sans-serif, system-ui, sans-serif" font-size="48" font-weight="750">Proof.</text>
    <text x="0" y="203" fill="#F8FAFC" font-family="ui-sans-serif, system-ui, sans-serif" font-size="48" font-weight="750">Pathway.</text>
    <text x="0" y="250" fill="#94A3B8" font-family="ui-sans-serif, system-ui, sans-serif" font-size="19">One visual hierarchy, built for GitHub.</text>

    <g transform="translate(0 306)">
      <rect width="650" height="124" rx="20" fill="#FFFFFF" opacity="0.055" stroke="#FFFFFF" stroke-opacity="0.12"/>
      <g transform="translate(28 26)">
        <circle cx="20" cy="20" r="20" fill="#6E56CF"/>
        <path d="M14 20h12M20 14v12" stroke="#FFFFFF" stroke-width="2.4" stroke-linecap="round"/>
        <text x="54" y="16" fill="#F8FAFC" font-family="ui-sans-serif, system-ui, sans-serif" font-size="16" font-weight="700">Repository-specific composition</text>
        <text x="54" y="42" fill="#94A3B8" font-family="ui-sans-serif, system-ui, sans-serif" font-size="14">Six systems. No universal template.</text>
      </g>
      <g transform="translate(338 26)">
        <circle cx="20" cy="20" r="20" fill="#0A7C66"/>
        <path d="M11 20l6 6 12-13" fill="none" stroke="#FFFFFF" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/>
        <text x="54" y="16" fill="#F8FAFC" font-family="ui-sans-serif, system-ui, sans-serif" font-size="16" font-weight="700">Rendered visual QA</text>
        <text x="54" y="42" fill="#94A3B8" font-family="ui-sans-serif, system-ui, sans-serif" font-size="14">Mobile, dark mode, assets, hierarchy.</text>
      </g>
    </g>
  </g>
</svg>
