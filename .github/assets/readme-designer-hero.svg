<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="620" viewBox="0 0 1280 620" role="img" aria-labelledby="title desc">
  <title id="title">GitHub README Designer neon identity</title>
  <desc id="desc">A neon GitHub README canvas surrounded by glowing magenta, cyan, violet, and green interface elements.</desc>
  <defs>
    <linearGradient id="void" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#070311"/>
      <stop offset="0.48" stop-color="#0B0920"/>
      <stop offset="1" stop-color="#04181D"/>
    </linearGradient>
    <linearGradient id="neon" x1="0" y1="0" x2="1" y2="0">
      <stop stop-color="#FF2BD6"/>
      <stop offset="0.34" stop-color="#A855F7"/>
      <stop offset="0.68" stop-color="#00E5FF"/>
      <stop offset="1" stop-color="#39FF88"/>
    </linearGradient>
    <radialGradient id="pinkAura">
      <stop stop-color="#FF2BD6" stop-opacity="0.34"/>
      <stop offset="1" stop-color="#FF2BD6" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="cyanAura">
      <stop stop-color="#00E5FF" stop-opacity="0.28"/>
      <stop offset="1" stop-color="#00E5FF" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="38" height="38" patternUnits="userSpaceOnUse">
      <path d="M38 0H0V38" fill="none" stroke="#8B5CF6" stroke-opacity="0.11" stroke-width="1"/>
    </pattern>
    <filter id="glowPink" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="7" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glowCyan" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="panelShadow" x="-30%" y="-30%" width="160%" height="170%">
      <feDropShadow dx="0" dy="24" stdDeviation="22" flood-color="#000000" flood-opacity="0.7"/>
    </filter>
    <clipPath id="frame"><rect width="1280" height="620" rx="34"/></clipPath>
  </defs>

  <g clip-path="url(#frame)">
    <rect width="1280" height="620" fill="url(#void)"/>
    <rect width="1280" height="620" fill="url(#grid)"/>
    <ellipse cx="180" cy="118" rx="380" ry="310" fill="url(#pinkAura)"/>
    <ellipse cx="1100" cy="520" rx="430" ry="350" fill="url(#cyanAura)"/>
    <path d="M-30 514C240 390 406 650 690 486S1084 310 1320 420" fill="none" stroke="url(#neon)" stroke-opacity="0.18" stroke-width="2"/>
    <path d="M-30 536C240 412 406 672 690 508S1084 332 1320 442" fill="none" stroke="url(#neon)" stroke-opacity="0.10" stroke-width="1"/>

    <g transform="translate(72 72)">
      <g filter="url(#glowPink)">
        <rect x="0" y="0" width="10" height="10" rx="2" fill="#FF2BD6"/>
        <rect x="18" y="0" width="10" height="10" rx="2" fill="#A855F7"/>
        <rect x="36" y="0" width="10" height="10" rx="2" fill="#00E5FF"/>
      </g>
      <text x="0" y="60" fill="#FF66E6" font-family="ui-monospace, SFMono-Regular, Consolas, monospace" font-size="15" font-weight="700" letter-spacing="3">GITHUB // VISUAL SYSTEM</text>
      <text x="0" y="132" fill="#FFFFFF" font-family="ui-sans-serif, system-ui, sans-serif" font-size="60" font-weight="800" letter-spacing="-2">README</text>
      <text x="0" y="196" fill="url(#neon)" font-family="ui-sans-serif, system-ui, sans-serif" font-size="60" font-weight="800" letter-spacing="-2">DESIGNER</text>
      <rect x="0" y="224" width="392" height="3" rx="1.5" fill="url(#neon)" filter="url(#glowCyan)"/>
      <text x="0" y="272" fill="#D8CFF0" font-family="ui-sans-serif, system-ui, sans-serif" font-size="22" font-weight="650">DESIGN THE FIRST THIRD.</text>
      <text x="0" y="308" fill="#8FA3B8" font-family="ui-sans-serif, system-ui, sans-serif" font-size="17">Identity → Proof → Pathway</text>

      <g transform="translate(0 354)">
        <rect width="138" height="38" rx="19" fill="#FF2BD6" fill-opacity="0.10" stroke="#FF2BD6" stroke-opacity="0.72"/>
        <circle cx="22" cy="19" r="5" fill="#FF2BD6" filter="url(#glowPink)"/>
        <text x="38" y="24" fill="#FFD0F5" font-family="ui-monospace, SFMono-Regular, Consolas, monospace" font-size="12" font-weight="700">REPO-SPECIFIC</text>
        <rect x="150" width="132" height="38" rx="19" fill="#00E5FF" fill-opacity="0.08" stroke="#00E5FF" stroke-opacity="0.68"/>
        <circle cx="172" cy="19" r="5" fill="#00E5FF" filter="url(#glowCyan)"/>
        <text x="188" y="24" fill="#C8FAFF" font-family="ui-monospace, SFMono-Regular, Consolas, monospace" font-size="12" font-weight="700">GITHUB-NATIVE</text>
        <rect x="294" width="122" height="38" rx="19" fill="#39FF88" fill-opacity="0.07" stroke="#39FF88" stroke-opacity="0.64"/>
        <circle cx="316" cy="19" r="5" fill="#39FF88"/>
        <text x="332" y="24" fill="#C9FFDD" font-family="ui-monospace, SFMono-Regular, Consolas, monospace" font-size="12" font-weight="700">COPY-SAFE</text>
      </g>
    </g>

    <g transform="translate(604 62)" filter="url(#panelShadow)">
      <rect width="594" height="496" rx="24" fill="#080B16" fill-opacity="0.96" stroke="url(#neon)" stroke-width="1.5"/>
      <rect x="1" y="1" width="592" height="52" rx="23" fill="#111526"/>
      <rect x="1" y="30" width="592" height="23" fill="#111526"/>
      <circle cx="28" cy="27" r="6" fill="#FF2BD6" filter="url(#glowPink)"/>
      <circle cx="49" cy="27" r="6" fill="#A855F7"/>
      <circle cx="70" cy="27" r="6" fill="#00E5FF" filter="url(#glowCyan)"/>
      <text x="470" y="32" fill="#6F7890" font-family="ui-monospace, SFMono-Regular, Consolas, monospace" font-size="11">README.md</text>

      <g transform="translate(42 82)">
        <rect x="122" y="0" width="266" height="20" rx="10" fill="url(#neon)" filter="url(#glowCyan)"/>
        <rect x="164" y="42" width="182" height="8" rx="4" fill="#8C92AA"/>
        <rect x="205" y="66" width="100" height="7" rx="3.5" fill="#484F67"/>

        <rect x="0" y="104" width="510" height="202" rx="18" fill="#0E1425" stroke="#242B46"/>
        <rect x="20" y="124" width="470" height="18" rx="9" fill="#151D32"/>
        <rect x="20" y="164" width="318" height="12" rx="6" fill="#FF2BD6" filter="url(#glowPink)"/>
        <rect x="76" y="198" width="414" height="12" rx="6" fill="#00DDF6" filter="url(#glowCyan)"/>
        <rect x="130" y="232" width="286" height="12" rx="6" fill="#9D4EDD"/>
        <rect x="182" y="266" width="208" height="12" rx="6" fill="#39FF88"/>

        <rect x="40" y="334" width="126" height="34" rx="17" fill="#FF2BD6" fill-opacity="0.12" stroke="#FF2BD6"/>
        <rect x="180" y="334" width="126" height="34" rx="17" fill="#00E5FF" fill-opacity="0.09" stroke="#00E5FF"/>
        <rect x="320" y="334" width="126" height="34" rx="17" fill="#39FF88" fill-opacity="0.08" stroke="#39FF88"/>
        <rect x="12" y="410" width="486" height="7" rx="3.5" fill="#242B46"/>
      </g>
    </g>
  </g>
  <rect x="1" y="1" width="1278" height="618" rx="33" fill="none" stroke="url(#neon)" stroke-opacity="0.48" stroke-width="2"/>
</svg>
